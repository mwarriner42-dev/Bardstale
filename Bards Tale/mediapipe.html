<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Presence</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  margin:0;
  background:#0b0b0e;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:serif;
  color:#e6e6ea;
}

#stage{
  width:720px;
  height:520px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

#oval{
  width:260px;
  height:360px;
  border:2px solid rgba(120,255,180,.75);
  border-radius:50%;
}

#bard{
  margin-top:26px;
  text-align:center;
  font-size:15px;
  opacity:.85;
}

button{
  margin-top:34px;
  padding:12px 28px;
  font-size:15px;
  background:#1a1a22;
  color:#e6e6ea;
  border:1px solid #444;
  border-radius:4px;
  cursor:pointer;
}
</style>
</head>

<body>
<div id="stage">
  <div id="oval"></div>
  <div id="bard">
    Remain centered.<br>
    Let yourself settle.
  </div>
  <button onclick="location.href='book.html'">
    Enter the Story
  </button>
</div>
</body>
</html>
